name: first
on: push
jobs:
  job1:
    name: first job
    runs-on: ubuntu-latest
    steps:
      - name: step 1 for 1 job
        uses: actions/checkout@v2
      - name: step 2 for 1 job
        run: env | sort
  job2:
    name: second job
    runs-on: windows-latest
    steps:
      - name: step 1 for 2 job
        uses: actions/checkout@v2
      - name:  step 2 for 2 job
        run: echo second job for step 2
    
      

